<!DOCTYPE html>
<html lang="ru" class="h-full bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <title>Потвердите действие на странице</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/assets/favicon-16x16.png" sizes="16x16" />
    <link rel="icon" type="image/png" href="/assets/favicon-32x32.png" sizes="32x32" />
    <link rel="manifest" href="/assets/site.webmanifest">
    <script src="/assets/tail.js"></script>
    <style>
        /* Сложный анимированный фон */
        .mesh-gradient {
            background-image: radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.3) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.5) 0, transparent 50%);
        }
        /* Анимация сканирования на картинке */
        .scanner::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.1) 50%, transparent 51%);
            background-size: 100% 4px;
            animation: scan 2s linear infinite;
            pointer-events: none;
        }
        @keyframes scan { from { background-position: 0 0; } to { background-position: 0 100%; } }
        .pressing #pic { transform: scale(0.96); filter: brightness(1.3) saturate(1.2); }
    </style>
    
</head>
<body class="h-full w-full select-none touch-manipulation overflow-hidden text-slate-200 mesh-gradient" oncontextmenu="return false;">

    <div id="main-content" class="relative z-10 h-full flex flex-col items-center justify-between py-12 px-6 opacity-0 transition-all duration-1000 scale-110">
        
        <div class="relative group">
            <div class="absolute -inset-4 bg-blue-500/10 rounded-full blur-3xl opacity-50 group-hover:opacity-100 transition-opacity"></div>
            <div id="pic-frame" class="relative scanner overflow-hidden rounded-2xl border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                <img id="pic" src="image.png" class="w-72 h-72 sm:w-96 sm:h-96 object-cover transition-transform duration-300">
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <button id="btn" class="w-full group relative overflow-hidden bg-white/5 border border-white/10 py-5 rounded-xl transition-all active:scale-95">
                <div class="absolute inset-0 bg-white/5 translate-y-full group-hover:translate-y-0 transition-transform"></div>
                <span class="relative font-bold tracking-[0.3em] text-[11px] uppercase">🔊 ЗАГЛУШИТЬ</span>
            </button>
        </div>
    </div>

    <div id="cookie-overlay" class="fixed inset-0 z-[1000] bg-slate-950 flex items-center justify-center p-6 transition-all duration-500">
        <div class="bg-slate-900 border border-white/5 p-8 rounded-[2rem] max-w-md w-full shadow-2xl">
            <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center mb-6 text-2xl">🍪</div>
            <h2 class="text-2xl font-bold mb-4 tracking-tight">Файлы cookie</h2>
            <p class="text-slate-400 text-sm leading-relaxed mb-8">
                Для корректной работы сайта необходимо принять условия использования файлов cookie. При отказе от их использования данный сайт не будет работать корректно!
            </p>
            <button id="accept-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                ПРИНЯТЬ
            </button>
        </div>
    </div>

    <audio id="sound" src="sound.mp3" loop preload="auto"></audio>

    <script>
        const sound = document.getElementById('sound');
        const overlay = document.getElementById('cookie-overlay');
        const content = document.getElementById('main-content');
        const btn = document.getElementById('btn');
        const TG_LINK = 'https://yandex.ru/search/?text=скочать%20читы%20на%20браво%20стас%20с%20смс%20и%20регистрацией%20и%20с%20номром%20карты%20на%20телефон&lr=213';

        let activated = false;

        function handleInteraction(e) {
            if (!activated) {
                // ПЕРВЫЙ КЛИК: Активация
                sound.play().catch(() => {});
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                
                content.classList.replace('opacity-0', 'opacity-100');
                content.classList.replace('scale-110', 'scale-100');
                
                activated = true;
            } else {
                // ТРОЛЛИНГ: Редирект
                window.open(TG_LINK, '_blank');
                sound.play(); 
            }
        }

        // Слушаем клики по всему экрану
        document.addEventListener('click', (e) => {
            if (e.target.closest('#accept-btn')) {
                handleInteraction();
                return;
            }
            handleInteraction();
        });

        // Кнопка ЗАГЛУШИТЬ
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            window.open(TG_LINK, '_blank');
            sound.play();
        });

        // Эффекты нажатия
        document.addEventListener('mousedown', () => { if(activated) document.body.classList.add('pressing'); });
        document.addEventListener('mouseup', () => { document.body.classList.remove('pressing'); });
        document.addEventListener('touchstart', () => { if(activated) document.body.classList.add('pressing'); }, {passive:true});
        document.addEventListener('touchend', () => { document.body.classList.remove('pressing'); }, {passive:true});

        // Бессмертный звук
        setInterval(() => {
            if (activated && sound.paused) sound.play();
        }, 400);
    </script>
</body>
</html>
